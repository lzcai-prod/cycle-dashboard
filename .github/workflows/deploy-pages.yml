name: Deploy to GitHub Pages

on:
  # Run after data update completes
  workflow_run:
    workflows: ["Update Market Data"]
    types: [completed]
  # Manual trigger
  workflow_dispatch:
  # Also on push to main (for frontend changes)
  push:
    branches: [main]
    paths:
      - 'frontend/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Copy data to public
        working-directory: frontend
        run: node scripts/copy-data.mjs

      - name: Build
        working-directory: frontend
        env:
          NEXT_PUBLIC_BASE_PATH: /cycle-dashboard
        run: npx next build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
