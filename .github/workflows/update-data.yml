name: Update Market Data

on:
  schedule:
    # Run at 6 AM UTC on weekdays (after US market close + FRED update)
    - cron: '0 6 * * 1-5'
  workflow_dispatch:
    # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch and compute market data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Validate output exists
        run: |
          if [ ! -f data/latest.json ]; then
            echo "❌ data/latest.json was not created"
            exit 1
          fi
          echo "✅ data/latest.json exists ($(wc -c < data/latest.json) bytes)"
          # Basic JSON validity check
          python -c "import json; json.load(open('data/latest.json'))"
          echo "✅ JSON is valid"

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          # Only commit if there are changes
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "data: update market indicators ($(date -u +%Y-%m-%d))"
            git push
          fi
